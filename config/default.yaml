name: default
description: Default column mapping template — edit to match your data file

# Map canonical field names to the actual column names in your data file.
# Leave blank or remove lines for columns that don't exist in your file.
columns:
  email: Email
  first_name: First Name
  last_name: Last Name
  employer: Employer
  practice_setting: Practice Setting
  role: Role
  activity_id: Activity ID
  activity_name: Activity Name
  activity_date: Date
  activity_type: Activity Type
  pre_score: Pre-Test Score
  post_score: Post-Test Score
  pre_confidence: Pre-Confidence
  post_confidence: Post-Confidence
  comments: Comments
  therapeutic_area: Therapeutic Area
  disease_state: Disease State

# How assessment scores are formatted in this file.
# Options: auto, precomputed, flags, raw_text
assessment_format: auto

# Likert label-to-number mapping for confidence columns.
confidence_labels:
  Not at all confident: 1
  Somewhat confident: 2
  Moderately confident: 3
  Very confident: 4
  Extremely confident: 5
